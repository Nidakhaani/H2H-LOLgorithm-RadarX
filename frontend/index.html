<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadarX — IoT Network Discovery Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #080C10;
            color: #E8F4FD;
            font-family: 'Outfit', sans-serif;
            line-height: 1.6;
        }

        /* ─────────────────────────────────────────────── */
        /* HEADER */
        /* ─────────────────────────────────────────────── */
        header {
            background: linear-gradient(135deg, #0D1117 0%, #0A0E14 100%);
            border-bottom: 2px solid #1C2333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 180, 216, 0.1) 0%, transparent 70%);
            animation: radarSweep 4s infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes radarSweep {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: -100%; }
        }

        .header-left {
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .header-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 28px;
            font-weight: 600;
            color: #00B4D8;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-subtitle {
            font-size: 12px;
            color: #8B9EC7;
            margin-top: 4px;
        }

        .header-center {
            flex: 1;
            display: flex;
            justify-content: center;
            z-index: 1;
        }

        .network-badge {
            background: #0D1117;
            border: 2px solid #1C2333;
            border-radius: 12px;
            padding: 15px 30px;
            text-align: center;
            min-width: 200px;
        }

        .network-grade {
            font-size: 48px;
            font-weight: 700;
            color: #00B4D8;
            text-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
        }

        .network-label {
            font-size: 12px;
            color: #8B9EC7;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1;
        }

        .scan-button {
            background: linear-gradient(135deg, #00B4D8 0%, #0077B6 100%);
            border: none;
            color: #080C10;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .scan-button:hover:not(:disabled) {
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.6);
            transform: translateY(-2px);
        }

        .scan-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .scan-button.scanning {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 180, 216, 0.6), inset 0 0 10px rgba(0, 180, 216, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 180, 216, 0.8), inset 0 0 20px rgba(0, 180, 216, 0.4); }
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #2ED573;
            animation: none;
        }

        .status-dot.scanning {
            background-color: #FFA502;
            animation: blip 1s infinite;
        }

        @keyframes blip {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ─────────────────────────────────────────────── */
        /* PROGRESS BAR */
        /* ─────────────────────────────────────────────── */
        .progress-section {
            background: #0D1117;
            border-bottom: 2px solid #1C2333;
            padding: 20px 30px;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar {
            background: #1C2333;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #00B4D8 0%, #0077B6 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 12px;
            color: #8B9EC7;
        }

        /* ─────────────────────────────────────────────── */
        /* STATS ROW */
        /* ─────────────────────────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 30px;
            border-bottom: 2px solid #1C2333;
        }

        .stat-card {
            background: #0D1117;
            border: 2px solid #1C2333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #00B4D8;
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.2);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #00B4D8;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #8B9EC7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card.critical .stat-value {
            color: #FF4757;
        }

        .stat-card.critical.pulsing {
            animation: criticalPulse 1.5s infinite;
        }

        @keyframes criticalPulse {
            0%, 100% { border-color: #FF4757; box-shadow: 0 0 15px rgba(255, 71, 87, 0.2); }
            50% { border-color: #FF4757; box-shadow: 0 0 30px rgba(255, 71, 87, 0.4); }
        }

        .stat-card.high .stat-value {
            color: #FF6B35;
        }

        .stat-card.medium .stat-value {
            color: #FFA502;
        }

        .stat-card.secure .stat-value {
            color: #2ED573;
        }

        /* ─────────────────────────────────────────────── */
        /* TABS */
        /* ─────────────────────────────────────────────── */
        .tabs {
            display: flex;
            border-bottom: 2px solid #1C2333;
            padding: 0 30px;
            gap: 0;
        }

        .tab-button {
            background: none;
            border: none;
            color: #8B9EC7;
            padding: 15px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .tab-button:hover {
            color: #00B4D8;
        }

        .tab-button.active {
            color: #00B4D8;
            border-bottom-color: #00B4D8;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        /* ─────────────────────────────────────────────── */
        /* DEVICE GRID */
        /* ─────────────────────────────────────────────── */
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .device-card {
            background: #0D1117;
            border: 2px solid #1C2333;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            border-left: 5px solid #1C2333;
            cursor: pointer;
        }

        .device-card:hover {
            border-color: #00B4D8;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.2);
            transform: translateY(-4px);
        }

        .device-card.grade-a { border-left-color: #2ED573; }
        .device-card.grade-b { border-left-color: #0077B6; }
        .device-card.grade-c { border-left-color: #FFA502; }
        .device-card.grade-d { border-left-color: #FF6B35; }
        .device-card.grade-f { border-left-color: #FF4757; }

        .device-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: #0A0E14;
        }

        .device-type {
            font-weight: 600;
            font-size: 16px;
        }

        .device-emoji {
            font-size: 28px;
            margin-right: 10px;
        }

        .device-type-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grade-badge {
            background: #1C2333;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grade-badge.a {
            background: rgba(46, 213, 115, 0.2);
            color: #2ED573;
            box-shadow: 0 0 10px rgba(46, 213, 115, 0.4);
        }

        .grade-badge.b {
            background: rgba(0, 119, 182, 0.2);
            color: #0077B6;
            box-shadow: 0 0 10px rgba(0, 119, 182, 0.4);
        }

        .grade-badge.c {
            background: rgba(255, 165, 2, 0.2);
            color: #FFA502;
            box-shadow: 0 0 10px rgba(255, 165, 2, 0.4);
        }

        .grade-badge.d {
            background: rgba(255, 107, 53, 0.2);
            color: #FF6B35;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.4);
        }

        .grade-badge.f {
            background: rgba(255, 71, 87, 0.2);
            color: #FF4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
        }

        .device-body {
            padding: 15px;
        }

        .device-ip {
            font-family: 'IBM Plex Mono', monospace;
            color: #00B4D8;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .device-manufacturer {
            font-size: 12px;
            color: #8B9EC7;
            margin-bottom: 15px;
        }

        .port-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .port-pill {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
        }

        .port-pill.critical {
            background: rgba(255, 71, 87, 0.2);
            color: #FF4757;
        }

        .port-pill.high {
            background: rgba(255, 107, 53, 0.2);
            color: #FF6B35;
        }

        .port-pill.medium {
            background: rgba(255, 165, 2, 0.2);
            color: #FFA502;
        }

        .port-pill.safe {
            background: rgba(46, 213, 115, 0.2);
            color: #2ED573;
        }

        .port-pill.neutral {
            background: rgba(139, 158, 199, 0.1);
            color: #8B9EC7;
        }

        .risk-score-label {
            font-size: 11px;
            color: #8B9EC7;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .risk-score-bar {
            background: #1C2333;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .risk-score-fill {
            height: 100%;
            border-radius: 3px;
        }

        .device-card.grade-a .risk-score-fill { background: #2ED573; }
        .device-card.grade-b .risk-score-fill { background: #0077B6; }
        .device-card.grade-c .risk-score-fill { background: #FFA502; }
        .device-card.grade-d .risk-score-fill { background: #FF6B35; }
        .device-card.grade-f .risk-score-fill { background: #FF4757; }

        .device-button {
            width: 100%;
            background: #1C2333;
            border: 1px solid #00B4D8;
            color: #00B4D8;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .device-button:hover {
            background: #00B4D8;
            color: #080C10;
        }

        /* ─────────────────────────────────────────────── */
        /* SECURITY REPORT */
        /* ─────────────────────────────────────────────── */
        .report-section {
            margin-bottom: 40px;
        }

        .report-title {
            font-size: 18px;
            font-weight: 700;
            color: #00B4D8;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1C2333;
        }

        .network-overview {
            text-align: center;
            margin-bottom: 40px;
        }

        .overview-grade {
            font-size: 120px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 180, 216, 0.6);
        }

        .overview-grade.a { color: #2ED573; text-shadow: 0 0 30px rgba(46, 213, 115, 0.6); }
        .overview-grade.b { color: #0077B6; text-shadow: 0 0 30px rgba(0, 119, 182, 0.6); }
        .overview-grade.c { color: #FFA502; text-shadow: 0 0 30px rgba(255, 165, 2, 0.6); }
        .overview-grade.d { color: #FF6B35; text-shadow: 0 0 30px rgba(255, 107, 53, 0.6); }
        .overview-grade.f { color: #FF4757; text-shadow: 0 0 30px rgba(255, 71, 87, 0.6); }

        .overview-text {
            font-size: 16px;
            color: #E8F4FD;
            margin-bottom: 30px;
        }

        .grade-distribution {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .grade-dist-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .grade-dist-label {
            font-weight: 600;
            width: 40px;
            text-align: center;
        }

        .grade-dist-bar {
            flex: 1;
            background: #1C2333;
            height: 20px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .grade-dist-fill {
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #080C10;
        }

        .grade-dist-fill.a { background: #2ED573; }
        .grade-dist-fill.b { background: #0077B6; }
        .grade-dist-fill.c { background: #FFA502; }
        .grade-dist-fill.d { background: #FF6B35; }
        .grade-dist-fill.f { background: #FF4757; }

        .at-risk-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .at-risk-table th {
            text-align: left;
            padding: 12px;
            background: #0A0E14;
            border-bottom: 2px solid #1C2333;
            font-size: 12px;
            color: #8B9EC7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .at-risk-table td {
            padding: 12px;
            border-bottom: 1px solid #1C2333;
            font-size: 14px;
        }

        .at-risk-table tr:hover {
            background: #0A0E14;
        }

        .at-risk-table tr.grade-d {
            background: rgba(255, 107, 53, 0.05);
        }

        .at-risk-table tr.grade-f {
            background: rgba(255, 71, 87, 0.05);
        }

        .at-risk-ip {
            font-family: 'IBM Plex Mono', monospace;
            color: #00B4D8;
            font-weight: 600;
        }

        .remediation-list {
            list-style: none;
            counter-reset: item;
        }

        .remediation-list li {
            counter-increment: item;
            margin-bottom: 12px;
            padding-left: 40px;
            position: relative;
        }

        .remediation-list li::before {
            content: counter(item);
            position: absolute;
            left: 0;
            top: 0;
            background: #1C2333;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #00B4D8;
        }

        .remediation-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .remediation-pill {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .remediation-pill.critical {
            background: rgba(255, 71, 87, 0.2);
            color: #FF4757;
        }

        .remediation-pill.urgent {
            background: rgba(255, 107, 53, 0.2);
            color: #FF6B35;
        }

        .remediation-pill.medium {
            background: rgba(255, 165, 2, 0.2);
            color: #FFA502;
        }

        .remediation-text {
            color: #E8F4FD;
            flex: 1;
        }

        /* ─────────────────────────────────────────────── */
        /* WELCOME STATE */
        /* ─────────────────────────────────────────────── */
        .welcome-state {
            text-align: center;
            padding: 80px 30px;
        }

        .welcome-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: radarPulse 2s infinite;
        }

        @keyframes radarPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: #E8F4FD;
            margin-bottom: 10px;
        }

        .welcome-text {
            font-size: 14px;
            color: #8B9EC7;
        }

        /* ─────────────────────────────────────────────── */
        /* MODAL */
        /* ─────────────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 12, 16, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: #0D1117;
            border: 2px solid #1C2333;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #1C2333;
            border: none;
            color: #00B4D8;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #00B4D8;
            color: #080C10;
        }

        .modal-header {
            margin-bottom: 30px;
        }

        .modal-device-type {
            font-size: 32px;
            font-weight: 700;
            color: #E8F4FD;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .modal-field {
            background: #0A0E14;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #1C2333;
        }

        .modal-label {
            font-size: 11px;
            color: #8B9EC7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .modal-value {
            font-size: 14px;
            color: #E8F4FD;
            font-weight: 600;
        }

        .modal-value.ip {
            font-family: 'IBM Plex Mono', monospace;
            color: #00B4D8;
        }

        .modal-grade-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-grade {
            font-size: 64px;
            font-weight: 700;
            padding: 20px;
            border-radius: 8px;
            background: #0A0E14;
        }

        .modal-grade.a { color: #2ED573; text-shadow: 0 0 20px rgba(46, 213, 115, 0.5); }
        .modal-grade.b { color: #0077B6; text-shadow: 0 0 20px rgba(0, 119, 182, 0.5); }
        .modal-grade.c { color: #FFA502; text-shadow: 0 0 20px rgba(255, 165, 2, 0.5); }
        .modal-grade.d { color: #FF6B35; text-shadow: 0 0 20px rgba(255, 107, 53, 0.5); }
        .modal-grade.f { color: #FF4757; text-shadow: 0 0 20px rgba(255, 71, 87, 0.5); }

        .modal-score {
            flex: 1;
        }

        .modal-score-label {
            font-size: 12px;
            color: #8B9EC7;
            margin-bottom: 10px;
        }

        .modal-score-bar {
            background: #1C2333;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .modal-score-bar .risk-score-fill {
            height: 100%;
        }

        .modal-section-title {
            font-size: 14px;
            font-weight: 700;
            color: #00B4D8;
            margin-bottom: 15px;
            margin-top: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1C2333;
        }

        .modal-flags {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        .flag-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #0A0E14;
            border-left: 4px solid #1C2333;
            border-radius: 4px;
        }

        .flag-item.critical { border-left-color: #FF4757; }
        .flag-item.high { border-left-color: #FF6B35; }
        .flag-item.medium { border-left-color: #FFA502; }

        .flag-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .flag-item.critical .flag-indicator { background: #FF4757; }
        .flag-item.high .flag-indicator { background: #FF6B35; }
        .flag-item.medium .flag-indicator { background: #FFA502; }

        .flag-text {
            font-size: 13px;
            color: #E8F4FD;
            flex: 1;
        }

        .modal-remediation {
            list-style: none;
            counter-reset: item;
            margin-bottom: 25px;
        }

        .modal-remediation li {
            counter-increment: item;
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
            font-size: 13px;
            color: #E8F4FD;
        }

        .modal-remediation li::before {
            content: counter(item);
            position: absolute;
            left: 0;
            background: #1C2333;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #00B4D8;
        }

        .modal-timestamps {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: #0A0E14;
            border-radius: 6px;
            border: 1px solid #1C2333;
            margin-bottom: 25px;
        }

        .timestamp-item {
            flex: 1;
        }

        .timestamp-label {
            font-size: 11px;
            color: #8B9EC7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .timestamp-value {
            font-size: 12px;
            color: #E8F4FD;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* ─────────────────────────────────────────────── */
        /* FOOTER */
        /* ─────────────────────────────────────────────── */
        footer {
            background: #0A0E14;
            border-top: 2px solid #1C2333;
            padding: 20px 30px;
            text-align: center;
            font-size: 12px;
            color: #8B9EC7;
            margin-top: 40px;
        }

        /* ─────────────────────────────────────────────── */
        /* RESPONSIVE */
        /* ─────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .device-grid {
                grid-template-columns: 1fr;
            }

            .modal-grid {
                grid-template-columns: 1fr;
            }

            .modal-timestamps {
                flex-direction: column;
            }

            .overview-grade {
                font-size: 80px;
            }

            header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .header-left, .header-right {
                width: 100%;
                justify-content: center;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="header-title">📡 RadarX</div>
            <div class="header-subtitle">IoT Network Discovery Agent</div>
        </div>
        <div class="header-center">
            <div class="network-badge">
                <div class="network-grade" id="networkGrade">A</div>
                <div class="network-label" id="networkLabel">NETWORK SECURE</div>
            </div>
        </div>
        <div class="header-right">
            <button class="scan-button" id="scanBtn" onclick="triggerScan()">Scan Network</button>
            <div class="status-dot" id="statusDot"></div>
        </div>
    </header>

    <div class="progress-section" id="progressSection">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">📡 Discovering devices...</div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" id="totalDevices">0</div>
            <div class="stat-label">Total Devices</div>
        </div>
        <div class="stat-card critical">
            <div class="stat-value" id="criticalCount">0</div>
            <div class="stat-label">Critical (F)</div>
        </div>
        <div class="stat-card high">
            <div class="stat-value" id="highCount">0</div>
            <div class="stat-label">High Risk (D)</div>
        </div>
        <div class="stat-card secure">
            <div class="stat-value" id="secureCount">0</div>
            <div class="stat-label">Secure (A-B)</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="switchTab('devices')">📡 Devices</button>
        <button class="tab-button" onclick="switchTab('report')">🛡️ Security Report</button>
    </div>

    <div class="tab-content active" id="devicesTab">
        <div id="devicesContainer"></div>
    </div>

    <div class="tab-content" id="reportTab">
        <div id="reportContainer"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <footer>
        Built for Hack2Hire 1.0 | T John Institute of Technology | Team RadarX | 2026
    </footer>

    <script>
        let devices = [];
        let summary = {};
        let scanPollingInterval = null;

        function gradeToEmoji(grade) {
            const emojis = { 'A': '🛡️', 'B': '✅', 'C': '⚠️', 'D': '🚨', 'F': '🔴' };
            return emojis[grade] || '❓';
        }

        function getDeviceEmoji(deviceType) {
            const emojis = {
                'Camera': '📹', 'Printer': '🖨️', 'Router': '📡', 'Laptop': '💻', 'Phone': '📱',
                'Tablet': '📱', 'Smart TV': '📺', 'Smart Speaker': '🔊', 'Thermostat': '🌡️',
                'Light': '💡', 'Door Lock': '🔐', 'Server': '🖥️', 'PC': '🖥️'
            };
            for (const [key, emoji] of Object.entries(emojis)) {
                if (deviceType.includes(key)) return emoji;
            }
            return '🔌';
        }

        function getPortColor(port) {
            const critical = [21, 23, 445];
            const high = [80, 554, 1883, 1900];
            const safe = [22, 443, 5353];
            if (critical.includes(port)) return 'critical';
            if (high.includes(port)) return 'high';
            if (safe.includes(port)) return 'safe';
            return 'neutral';
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleString();
        }

        async function loadData() {
            try {
                const [devicesRes, summaryRes] = await Promise.all([
                    fetch('/api/devices'),
                    fetch('/api/summary')
                ]);

                devices = await devicesRes.json();
                summary = await summaryRes.json();

                // Sort devices by risk score descending
                devices.sort((a, b) => (b.risk_score || 0) - (a.risk_score || 0));

                updateHeader();
                updateStats();
                renderDevices(devices);
                renderReport(devices, summary);
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function updateHeader() {
            if (!summary.network_grade) {
                document.getElementById('networkGrade').textContent = 'A';
                document.getElementById('networkLabel').textContent = 'NETWORK SECURE';
                return;
            }
            const grade = summary.network_grade;
            const labels = {
                'A': 'NETWORK SECURE', 'B': 'NETWORK HEALTHY',
                'C': 'NETWORK AT RISK', 'D': 'NETWORK CRITICAL', 'F': 'NETWORK CRITICAL'
            };
            document.getElementById('networkGrade').textContent = grade;
            document.getElementById('networkLabel').textContent = labels[grade] || 'UNKNOWN';
        }

        function updateStats() {
            const total = devices.length;
            const critical = devices.filter(d => d.grade === 'F').length;
            const high = devices.filter(d => d.grade === 'D').length;
            const secure = devices.filter(d => ['A', 'B'].includes(d.grade)).length;

            document.getElementById('totalDevices').textContent = total;
            document.getElementById('criticalCount').textContent = critical;
            document.getElementById('highCount').textContent = high;
            document.getElementById('secureCount').textContent = secure;

            if (critical > 0) {
                document.querySelector('.stat-card.critical').classList.add('pulsing');
            } else {
                document.querySelector('.stat-card.critical').classList.remove('pulsing');
            }
        }

        function renderDevices(devices) {
            const container = document.getElementById('devicesContainer');

            if (devices.length === 0) {
                container.innerHTML = `
                    <div class="welcome-state">
                        <div class="welcome-emoji">📡</div>
                        <div class="welcome-title">No devices discovered yet</div>
                        <div class="welcome-text">Click Scan Network to begin</div>
                    </div>
                `;
                return;
            }

            let html = '<div class="device-grid">';
            devices.forEach(device => {
                const emoji = getDeviceEmoji(device.device_type);
                const ports = device.open_ports || [];
                const portHtml = ports.slice(0, 8).map(p => {
                    const color = getPortColor(p);
                    return `<div class="port-pill ${color}">${p}</div>`;
                }).join('');

                html += `
                    <div class="device-card grade-${device.grade.toLowerCase()}" onclick="openModal('${device.ip_address}')">
                        <div class="device-header">
                            <div class="device-type-text">
                                <span class="device-emoji">${emoji}</span>
                                <span class="device-type">${device.device_type}</span>
                            </div>
                            <div class="grade-badge ${device.grade.toLowerCase()}">${device.grade}</div>
                        </div>
                        <div class="device-body">
                            <div class="device-ip">${device.ip_address}</div>
                            <div class="device-manufacturer">${device.manufacturer || 'Unknown'}</div>
                            <div class="port-pills">${portHtml || '<span style="color: #8B9EC7; font-size: 12px;">No open ports</span>'}</div>
                            <div class="risk-score-label">
                                <span>Risk Score</span>
                                <span>${device.risk_score || 0}</span>
                            </div>
                            <div class="risk-score-bar">
                                <div class="risk-score-fill" style="width: ${(device.risk_score || 0)}%"></div>
                            </div>
                            <button class="device-button">View Details →</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderReport(devices, summary) {
            const container = document.getElementById('reportContainer');

            if (devices.length === 0) {
                container.innerHTML = `
                    <div class="welcome-state">
                        <div class="welcome-emoji">📡</div>
                        <div class="welcome-title">No devices discovered yet</div>
                        <div class="welcome-text">Click Scan Network to begin</div>
                    </div>
                `;
                return;
            }

            const grade = summary.network_grade || 'A';
            const gradeLabels = { 'A': 'SECURE', 'B': 'HEALTHY', 'C': 'AT RISK', 'D': 'CRITICAL', 'F': 'CRITICAL' };
            const atRiskCount = devices.filter(d => ['D', 'F'].includes(d.grade)).length;

            // Grade distribution
            const gradeCounts = { 'A': 0, 'B': 0, 'C': 0, 'D': 0, 'F': 0 };
            devices.forEach(d => gradeCounts[d.grade]++);
            const total = devices.length;

            let distHtml = '';
            ['A', 'B', 'C', 'D', 'F'].forEach(g => {
                const count = gradeCounts[g];
                const pct = total > 0 ? Math.round((count / total) * 100) : 0;
                const colorMap = { 'A': 'a', 'B': 'b', 'C': 'c', 'D': 'd', 'F': 'f' };
                distHtml += `
                    <div class="grade-dist-row">
                        <div class="grade-dist-label">${g}</div>
                        <div class="grade-dist-bar">
                            <div class="grade-dist-fill ${colorMap[g]}" style="width: ${pct}%">${count}</div>
                        </div>
                    </div>
                `;
            });

            // At-risk devices table
            const atRiskDevices = devices.filter(d => ['D', 'F'].includes(d.grade));
            let tableHtml = '';
            if (atRiskDevices.length > 0) {
                tableHtml = '<table class="at-risk-table"><thead><tr><th>IP Address</th><th>Device Type</th><th>Grade</th><th>Top Remediation</th></tr></thead><tbody>';
                atRiskDevices.forEach(d => {
                    const topRemediation = (d.remediation && d.remediation.length > 0) ? d.remediation[0] : 'Update firmware';
                    tableHtml += `<tr class="grade-${d.grade.toLowerCase()}">
                        <td class="at-risk-ip">${d.ip_address}</td>
                        <td>${d.device_type}</td>
                        <td><span class="grade-badge ${d.grade.toLowerCase()}">${d.grade}</span></td>
                        <td>${topRemediation}</td>
                    </tr>`;
                });
                tableHtml += '</tbody></table>';
            }

            // Remediation checklist
            const allRemediations = [];
            devices.forEach(d => {
                if (d.remediation && Array.isArray(d.remediation)) {
                    d.remediation.forEach(r => {
                        if (!allRemediations.find(item => item.text === r)) {
                            allRemediations.push({ text: r, priority: 'critical' });
                        }
                    });
                }
            });

            const priorityMap = {
                'CRITICAL': 'critical', 'URGENT': 'urgent', 'IMMEDIATE': 'urgent',
                'HIGH': 'urgent', 'MEDIUM': 'medium', 'LOW': 'medium'
            };
            allRemediations.forEach(r => {
                Object.keys(priorityMap).forEach(key => {
                    if (r.text.toUpperCase().includes(key)) r.priority = priorityMap[key];
                });
            });
            allRemediations.sort((a, b) => {
                const priorityOrder = { critical: 0, urgent: 1, medium: 2 };
                return priorityOrder[a.priority] - priorityOrder[b.priority];
            });

            let remHtml = '<ul class="remediation-list">';
            allRemediations.forEach(r => {
                remHtml += `<li>
                    <div class="remediation-item">
                        <span class="remediation-pill ${r.priority}">${r.priority}</span>
                        <div class="remediation-text">${r.text}</div>
                    </div>
                </li>`;
            });
            remHtml += '</ul>';

            container.innerHTML = `
                <div class="report-section">
                    <div class="network-overview">
                        <div class="overview-grade ${grade.toLowerCase()}">${grade}</div>
                        <div class="overview-text">${total} devices analyzed — ${atRiskCount} require immediate action</div>
                        <div class="report-title">Grade Distribution</div>
                        <div class="grade-distribution">${distHtml}</div>
                    </div>
                </div>
                ${atRiskDevices.length > 0 ? `
                <div class="report-section">
                    <div class="report-title">Devices Requiring Immediate Action</div>
                    ${tableHtml}
                </div>
                ` : ''}
                <div class="report-section">
                    <div class="report-title">Full Remediation Checklist</div>
                    ${remHtml}
                </div>
            `;
        }

        function openModal(ipAddress) {
            const device = devices.find(d => d.ip_address === ipAddress);
            if (!device) return;

            const emoji = getDeviceEmoji(device.device_type);
            const ports = device.open_ports || [];
            const portHtml = ports.map(p => {
                const color = getPortColor(p);
                return `<div class="port-pill ${color}">${p}</div>`;
            }).join('');

            let flagsHtml = '';
            if (device.risk_flags && Array.isArray(device.risk_flags)) {
                device.risk_flags.forEach(flag => {
                    let severity = 'medium';
                    if (flag.includes('Telnet') || flag.includes('FTP')) severity = 'critical';
                    else if (flag.includes('HTTP') || flag.includes('RTSP')) severity = 'high';
                    flagsHtml += `
                        <div class="flag-item ${severity}">
                            <div class="flag-indicator"></div>
                            <div class="flag-text">${flag}</div>
                        </div>
                    `;
                });
            }

            let remHtml = '';
            if (device.remediation && Array.isArray(device.remediation)) {
                remHtml = '<ul class="modal-remediation">';
                device.remediation.forEach(r => {
                    remHtml += `<li>${r}</li>`;
                });
                remHtml += '</ul>';
            }

            const content = `
                <div class="modal-header">
                    <div class="modal-device-type">${emoji} ${device.device_type}</div>
                </div>
                <div class="modal-grid">
                    <div class="modal-field"><div class="modal-label">IP Address</div><div class="modal-value ip">${device.ip_address}</div></div>
                    <div class="modal-field"><div class="modal-label">MAC Address</div><div class="modal-value">${device.mac_address || 'Unknown'}</div></div>
                    <div class="modal-field"><div class="modal-label">Hostname</div><div class="modal-value">${device.hostname || 'Unknown'}</div></div>
                    <div class="modal-field"><div class="modal-label">Manufacturer</div><div class="modal-value">${device.manufacturer || 'Unknown'}</div></div>
                </div>
                <div class="modal-grade-section">
                    <div class="modal-grade ${device.grade.toLowerCase()}">${device.grade}</div>
                    <div class="modal-score">
                        <div class="modal-score-label">Risk Score (0-100)</div>
                        <div class="modal-score-bar">
                            <div class="risk-score-fill" style="width: ${device.risk_score || 0}%; background: ${['#2ED573', '#0077B6', '#FFA502', '#FF6B35', '#FF4757'][['A', 'B', 'C', 'D', 'F'].indexOf(device.grade)]}"></div>
                        </div>
                        <strong>${device.risk_score || 0}</strong> out of 100
                    </div>
                </div>
                ${flagsHtml ? `<div class="modal-section-title">Risk Flags</div><div class="modal-flags">${flagsHtml}</div>` : ''}
                ${portHtml ? `<div class="modal-section-title">Open Ports</div><div class="port-pills">${portHtml}</div>` : ''}
                ${remHtml ? `<div class="modal-section-title">Remediation Steps</div>${remHtml}` : ''}
                <div class="modal-section-title">Timeline</div>
                <div class="modal-timestamps">
                    <div class="timestamp-item">
                        <div class="timestamp-label">First Seen</div>
                        <div class="timestamp-value">${formatDate(device.first_seen)}</div>
                    </div>
                    <div class="timestamp-item">
                        <div class="timestamp-label">Last Seen</div>
                        <div class="timestamp-value">${formatDate(device.last_seen)}</div>
                    </div>
                </div>
            `;

            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal(event) {
            if (event && event.target !== document.getElementById('modalOverlay')) return;
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function triggerScan() {
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.disabled = true;
            scanBtn.classList.add('scanning');
            document.getElementById('statusDot').classList.add('scanning');
            document.getElementById('progressSection').classList.add('active');

            try {
                await fetch('/api/scan', { method: 'POST' });
                startPolling();
            } catch (error) {
                console.error('Scan error:', error);
                scanBtn.disabled = false;
                scanBtn.classList.remove('scanning');
            }
        }

        function startPolling() {
            scanPollingInterval = setInterval(async () => {
                try {
                    const res = await fetch('/api/scan/status');
                    const status = await res.json();

                    const progressFill = document.getElementById('progressFill');
                    const progressText = document.getElementById('progressText');

                    progressFill.style.width = `${status.progress || 0}%`;

                    const stages = {
                        'discovering': '📡 Discovering devices...',
                        'port_scanning': '🔍 Scanning ports...',
                        'fingerprinting': '🏷️ Fingerprinting devices...',
                        'grading': '🛡️ Calculating security grades...',
                        'storing': '💾 Saving results...'
                    };
                    progressText.textContent = stages[status.stage] || 'Scanning...';

                    if (!status.active) {
                        clearInterval(scanPollingInterval);
                        const scanBtn = document.getElementById('scanBtn');
                        scanBtn.disabled = false;
                        scanBtn.classList.remove('scanning');
                        document.getElementById('statusDot').classList.remove('scanning');
                        setTimeout(() => {
                            document.getElementById('progressSection').classList.remove('active');
                            loadData();
                        }, 500);
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 2000);
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadarX — IoT Intelligence Tactical Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080C10;
            --bg-panel: #0D1117;
            --primary: #00B4D8;
            --accent: #0077B6;
            --grade-f: #EF4444;
            --grade-d: #F97316;
            --grade-c: #F59E0B;
            --grade-b: #60A5FA;
            --grade-a: #22C55E;
            --border: #1C2333;
            --text-main: #E8F4FD;
            --text-dim: #8B9EC7;
            --muted: #1A2332;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ─────────────────────────────────────────────── */
        /* HEADER */
        /* ─────────────────────────────────────────────── */
        header {
            background: linear-gradient(135deg, #0D1117 0%, #0A0E14 100%);
            border-bottom: 2px solid var(--border);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 26px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .scan-button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            color: var(--bg-deep);
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        .scan-button:hover:not(:disabled) {
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
            transform: translateY(-2px);
        }

        .scan-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .scan-button.glow-animation {
            animation: pulseButton 800ms ease-in-out;
        }

        @keyframes pulseButton {
            0% { box-shadow: 0 0 0px var(--primary); }
            50% { box-shadow: 0 0 30px var(--primary), 0 0 60px var(--primary); }
            100% { box-shadow: 0 0 0px var(--primary); }
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--grade-a);
        }

        .status-dot.scanning {
            background-color: var(--grade-c);
            animation: blip 1s infinite;
        }

        @keyframes blip {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); }
        }

        /* ─────────────────────────────────────────────── */
        /* STATS ROW & HEALTH SCORE */
        /* ─────────────────────────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
            gap: 15px;
            padding: 20px 30px;
            border-bottom: 2px solid var(--border);
        }

        .health-card {
            background: rgba(13, 17, 23, 0.8);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .health-card:hover {
            border-color: var(--primary);
        }

        .health-ring-container {
            position: relative;
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }

        .health-ring-svg { transform: rotate(-90deg); }
        .health-ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
        .health-ring-fill {
            fill: none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round;
            stroke-dasharray: 226.19; stroke-dashoffset: 226.19;
            transition: stroke-dashoffset 1s ease-out;
        }

        .health-value-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 20px; font-weight: 700; font-family: 'IBM Plex Mono', monospace;
        }

        .health-info { display: flex; flex-direction: column; }
        .health-score-val { font-size: 32px; font-weight: 700; line-height: 1; color: var(--text-main); }
        .health-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .health-status-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-top: 6px; width: fit-content; text-transform: uppercase; }

        .stat-card {
            background: var(--bg-panel); border: 2px solid var(--border); border-radius: 8px;
            padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; transition: all 0.3s ease;
        }

        .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); font-family: 'IBM Plex Mono', monospace; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .stat-card.critical .stat-value { color: var(--grade-f); }
        .stat-card.high .stat-value { color: var(--grade-d); }
        .stat-card.secure .stat-value { color: var(--grade-a); }

        /* ─────────────────────────────────────────────── */
        /* CINEMATIC RADAR (Feature Redesign) */
        /* ─────────────────────────────────────────────── */
        .radar-section {
            background: radial-gradient(circle at center, #0F1620 0%, #080C10 100%);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 2px solid var(--border);
            min-height: 480px;
            opacity: 0;
            overflow: hidden;
        }

        .radar-container {
            position: relative;
            width: 320px;
            height: 320px;
            transition: all 1200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        canvas#radarCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
        }

        .radar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .radar-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 0 10px currentColor;
            opacity: 0;
        }

        .radar-dot.show {
            animation: bounceIn 600ms cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bounceIn {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .radar-dot.critical {
            animation: bounceIn 600ms cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulse-red 2s infinite 600ms;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .radar-dot.ghost-signal {
            opacity: 0.2 !important;
            box-shadow: none !important;
            filter: grayscale(1);
        }

        .radar-tooltip {
            position: fixed;
            background: #0D1117;
            border: 1px solid var(--primary);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* ─────────────────────────────────────────────── */
        /* DEVICE LAYOUT */
        /* ─────────────────────────────────────────────── */
        .tabs { display: flex; border-bottom: 2px solid var(--border); padding: 0 30px; background: #0A0E14; }
        .tab-button {
            background: none; border: none; color: var(--text-dim); padding: 18px 25px;
            font-size: 13px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent;
            transition: all 0.2s ease; font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 1px;
        }
        .tab-button.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(0, 180, 216, 0.05); }
        
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }

        .devices-container-wrapper {
            transition: opacity 600ms ease, transform 600ms ease;
        }

        .devices-container-wrapper.hidden {
            opacity: 0;
            transform: translateY(40px);
            pointer-events: none;
        }

        .device-section-block { margin-bottom: 50px; }
        .section-header-wrap { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
        .section-header { font-size: 18px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .section-subtext { font-size: 13px; color: var(--text-dim); }

        .pulse-dot-green { width: 10px; height: 10px; border-radius: 50%; background: var(--grade-a); animation: green-blip 1.5s infinite; }
        @keyframes green-blip {
            0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { transform: scale(1.2); opacity: 0.6; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
        }
        .hollow-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--text-dim); }

        .section-divider {
            display: flex; align-items: center; gap: 15px; margin: 40px 0; color: #1a2332; font-size: 12px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
        }
        .section-divider::before, .section-divider::after { content: ""; flex: 1; height: 1px; background: #1a2332; }

        .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

        /* Card Styles */
        .device-card {
            background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px;
            overflow: hidden; opacity: 1; transform: translateY(0);
            border-left: 6px solid var(--border); cursor: pointer; position: relative;
        }
        
        .active-card:hover {
            border-color: var(--primary); transform: translateY(-5px);
            box-shadow: 0 10px 40px -10px rgba(0, 180, 216, 0.3), 0 0 20px -5px var(--grade-color);
        }

        .stale-card { filter: opacity(0.6) grayscale(0.4); border-left-width: 4px; }
        .stale-card:hover { filter: opacity(0.8) grayscale(0.2); }

        .card-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-start; background: rgba(255,255,255,0.02); }
        .card-type-wrap { display: flex; flex-direction: column; }
        .card-type-label { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .card-manufacturer { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .grade-badge {
            width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 16px; color: #080C10; position: relative;
        }
        .active-card .grade-badge { box-shadow: 0 0 12px var(--grade-color); }

        .card-body { padding: 20px; }
        .card-ip { font-family: 'IBM Plex Mono', monospace; color: var(--primary); font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        
        .status-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px; margin-bottom: 15px; text-transform: uppercase; }
        .status-tag.active { background: rgba(34, 197, 94, 0.1); color: var(--grade-a); }
        .status-tag.stale { background: rgba(139, 158, 199, 0.1); color: var(--text-dim); }

        .risk-bar-wrap { margin-bottom: 20px; }
        .risk-bar-label { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; margin-bottom: 6px; color: var(--text-dim); }
        .risk-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .risk-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }

        .port-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .port-pill {
            font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 4px; background: var(--muted); color: var(--text-dim);
        }
        .port-pill.danger { background: rgba(239, 68, 68, 0.2); color: var(--grade-f); }
        .port-pill.warn { background: rgba(245, 158, 11, 0.2); color: var(--grade-c); }
        .port-pill.safe { background: rgba(34, 197, 94, 0.2); color: var(--grade-a); }

        .view-btn {
            width: 100%; background: none; border: 1px solid var(--border); color: var(--text-dim);
            padding: 10px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }

        /* Modal & Progress */
        .investigate-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6);
            z-index: 200; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(4px);
        }
        .investigate-overlay.active { opacity: 1; visibility: visible; }
        .investigate-panel {
            position: fixed; top: 0; right: -360px; width: 360px; height: 100%; background: #0D1117;
            border-left: 2px solid var(--border); z-index: 201; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .investigate-panel.active { transform: translateX(-360px); }
        
        .progress-section { background: #0D1117; padding: 12px 30px; border-bottom: 1px solid var(--border); display: none; }
        .progress-section.active { display: block; }
        .progress-bar-container { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
        .progress-bar-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
        .progress-status { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }

        footer { padding: 40px; text-align: center; font-size: 12px; color: var(--text-dim); border-top: 1px solid var(--border); background: #0A0E14; }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="header-title">📡 RADARX</div>
            <div class="header-subtitle">Intelligence Discovery Agent v1.5</div>
        </div>
        <div class="header-right">
            <button class="scan-button" id="scanBtn" onclick="triggerScan()">Initiate Network Scan</button>
            <div class="status-dot" id="statusDot"></div>
        </div>
    </header>

    <div class="progress-section" id="progressSection">
        <div class="progress-bar-container"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-status" id="progressText">Initializing sweep...</div>
    </div>

    <div class="stats-row">
        <div class="health-card" id="healthCard">
            <div class="health-ring-container">
                <svg class="health-ring-svg" width="80" height="80">
                    <circle class="health-ring-bg" cx="40" cy="40" r="36"></circle>
                    <circle class="health-ring-fill" id="healthRing" cx="40" cy="40" r="36"></circle>
                </svg>
                <div class="health-value-display" id="healthDisplayValue">0%</div>
            </div>
            <div class="health-info">
                <div class="health-label">Fleet Intelligence</div>
                <div class="health-score-val">Network Health</div>
                <div class="health-status-badge" id="healthStatusBadge">Waiting...</div>
            </div>
        </div>
        <div class="stat-card"><div class="stat-value" id="totalDevices">--</div><div class="stat-label">Total Assets</div></div>
        <div class="stat-card critical"><div class="stat-value" id="criticalCount">--</div><div class="stat-label">Critical (F)</div></div>
        <div class="stat-card high"><div class="stat-value" id="highCount">--</div><div class="stat-label">High Risk (D)</div></div>
        <div class="stat-card secure"><div class="stat-value" id="secureCount">--</div><div class="stat-label">Stable (A-B)</div></div>
    </div>

    <!-- Cinematic Radar Section -->
    <div class="radar-section" id="radarSection">
        <div class="radar-container" id="radarContainer">
            <canvas id="radarCanvas" width="320" height="320"></canvas>
            <div class="radar-overlay" id="radarDots"></div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="switchTab('devices', event)">📡 Fleet Assets</button>
        <button class="tab-button" onclick="switchTab('report', event)">🛡️ Security Report</button>
    </div>

    <div class="tab-content active" id="devicesTab">
        <div id="devicesContainerWrapper" class="devices-container-wrapper">
            <div id="devicesContainer"></div>
        </div>
    </div>

    <div class="tab-content" id="reportTab">
        <div id="reportContainer"></div>
    </div>

    <div class="investigate-overlay" id="investigateOverlay" onclick="closeInvestigation()"></div>
    <div class="investigate-panel" id="investigatePanel">
        <button class="panel-close" onclick="closeInvestigation()">✕</button>
        <div class="panel-header" id="panelHeader"></div>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <div class="radar-tooltip" id="radarTooltip"></div>

    <footer>RADARX QUANTUM INTELLIGENCE TERMINAL | T JOHN INSTITUTE OF TECHNOLOGY</footer>

    <script>
        let devices = [];
        let summary = {};
        let scanActive = false;
        let sweepAngle = 0;
        let foundIps = new Set();

        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const width = 320;
        const height = 320;

        function animateRadar() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(0, 180, 216, 0.15)'; ctx.lineWidth = 1;
            for(let r = 40; r <= 160; r += 40) { ctx.beginPath(); ctx.arc(width/2, height/2, r, 0, Math.PI * 2); ctx.stroke(); }
            ctx.beginPath(); ctx.moveTo(width/2, 10); ctx.lineTo(width/2, height-10); ctx.moveTo(10, height/2); ctx.lineTo(width-10, height/2); ctx.stroke();

            const sweepSpeed = scanActive ? 0.07 : 0.026;
            sweepAngle += sweepSpeed;
            if (sweepAngle > Math.PI * 2) sweepAngle = 0;

            // Randomized Sector Interference (Realistic Noise)
            if (scanActive && Math.random() > 0.95) {
                createInterferenceBlip();
            }

            ctx.save(); ctx.translate(width/2, height/2); ctx.rotate(sweepAngle);
            for(let i = 0; i < 60; i++) {
                ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0, 0, 160, -0.05 - (i * 0.01), 0 - (i * 0.01));
                ctx.fillStyle = `rgba(0, 180, 216, ${0.3 * (1 - i/60)})`; ctx.fill();
            }
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, -160); ctx.strokeStyle = 'rgba(0, 180, 216, 0.8)'; ctx.lineWidth = 2; ctx.stroke();
            ctx.restore();
            requestAnimationFrame(animateRadar);
        }

        function createInterferenceBlip() {
            const container = document.getElementById('radarDots');
            const blip = document.createElement('div');
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 150;
            const x = 160 + radius * Math.cos(angle);
            const y = 160 + radius * Math.sin(angle);
            
            blip.style.position = 'absolute';
            blip.style.width = '4px';
            blip.style.height = '4px';
            blip.style.background = 'rgba(245, 158, 11, 0.5)';
            blip.style.borderRadius = '50%';
            blip.style.left = x + 'px';
            blip.style.top = y + 'px';
            blip.style.boxShadow = '0 0 5px orange';
            blip.style.zIndex = '4';
            container.appendChild(blip);
            
            setTimeout(() => blip.remove(), 600);
        }

        async function loadData(silent = false) {
            try {
                const [devicesRes, summaryRes] = await Promise.all([fetch('/api/devices'), fetch('/api/summary')]);
                devices = await devicesRes.json();
                summary = await summaryRes.json();
                
                if (!silent) {
                    updateStats(); updateHealthScore(); renderDeviceGrid(); renderReport();
                }
            } catch (err) { console.error("Telemetry failure:", err); }
        }

        function updateStats() {
            const counts = { F: 0, D: 0, AB: 0 };
            devices.forEach(d => { if (d.grade === 'F') counts.F++; else if (d.grade === 'D') counts.D++; else if (['A', 'B'].includes(d.grade)) counts.AB++; });
            document.getElementById('totalDevices').innerText = devices.length;
            document.getElementById('criticalCount').innerText = counts.F;
            document.getElementById('highCount').innerText = counts.D;
            document.getElementById('secureCount').innerText = counts.AB;
        }

        function updateHealthScore() {
            const display = document.getElementById('healthDisplayValue');
            const ring = document.getElementById('healthRing');
            const badge = document.getElementById('healthStatusBadge');
            if (devices.length === 0) { display.innerText = "--"; return; }
            const avgRisk = devices.reduce((acc, d) => acc + (d.risk_score || 0), 0) / devices.length;
            const healthRaw = Math.max(0, Math.min(100, Math.round(100 - avgRisk)));
            display.innerText = healthRaw + "%";
            ring.style.strokeDashoffset = 226.19 - (226.19 * healthRaw / 100);
            if (healthRaw >= 80) { badge.innerText = "HEALTHY"; badge.className = "health-status-badge status-safe"; ring.style.stroke = "var(--grade-a)"; }
            else if (healthRaw >= 50) { badge.innerText = "MODERATE"; badge.className = "health-status-badge status-warning"; ring.style.stroke = "var(--grade-c)"; }
            else { badge.innerText = "CRITICAL"; badge.className = "health-status-badge status-critical"; ring.style.stroke = "var(--grade-f)"; }
        }

        function getRadarPos(ip) {
            let hash = 0; for (let i = 0; i < ip.length; i++) { hash = ((hash << 5) - hash) + ip.charCodeAt(i); hash |= 0; }
            const angle = (Math.abs(hash) % 360) * (Math.PI / 180);
            const radius = 30 + (Math.abs(hash * 13) % 120);
            return { x: 160 + radius * Math.cos(angle - Math.PI/2), y: 160 + radius * Math.sin(angle - Math.PI/2) };
        }

        function addRadarDot(device, isGhost = false) {
            const existingDot = document.getElementById(`dot-${device.ip_address.replace(/\./g, '-')}`);
            if (existingDot) {
                // If resolving a ghost dot to active
                if (!isGhost && existingDot.classList.contains('ghost-signal')) {
                    resolveGhostDot(existingDot, device);
                }
                return;
            }

            const container = document.getElementById('radarDots');
            const pos = getRadarPos(device.ip_address);
            const dot = document.createElement('div');
            dot.id = `dot-${device.ip_address.replace(/\./g, '-')}`;
            
            if (isGhost) {
                dot.className = `radar-dot ghost-signal show`;
                dot.style.color = '#334155';
                dot.style.backgroundColor = '#334155';
            } else {
                let color = "#22C55E";
                if (device.risk_score > 60) color = "#EF4444";
                else if (device.risk_score > 30) color = "#F59E0B";
                
                dot.className = `radar-dot ${device.risk_score > 60 ? 'critical' : ''} show`;
                dot.style.color = color;
                dot.style.backgroundColor = color;
            }
            
            dot.style.left = pos.x + 'px'; dot.style.top = pos.y + 'px';
            dot.onmouseover = (e) => {
                const tt = document.getElementById('radarTooltip');
                tt.innerHTML = `<strong>${device.ip_address}</strong><br>${isGhost ? 'Pending Verification...' : device.grade + ' | ' + device.device_type}`;
                tt.style.display = "block"; tt.style.left = (e.clientX + 15) + "px"; tt.style.top = (e.clientY + 15) + "px";
            };
            dot.onmouseout = () => document.getElementById('radarTooltip').style.display = "none";
            
            container.appendChild(dot);
        }

        function resolveGhostDot(dot, device) {
            let color = "#22C55E";
            if (device.risk_score > 60) color = "#EF4444";
            else if (device.risk_score > 30) color = "#F59E0B";
            
            dot.classList.remove('ghost-signal');
            if (device.risk_score > 60) dot.classList.add('critical');
            dot.style.color = color;
            dot.style.backgroundColor = color;
            dot.style.transition = 'all 0.5s ease';
            dot.style.transform = 'translate(-50%, -50%) scale(1.5)';
            setTimeout(() => dot.style.transform = 'translate(-50%, -50%) scale(1)', 500);
        }

        function renderDeviceGrid(animate = false) {
            const container = document.getElementById('devicesContainer');
            container.innerHTML = "";
            
            if (devices.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:80px; color:var(--text-dim);">NO ASSETS DETECTED<br><small>SYSTEM READY FOR NETWORK SCAN</small></div>`;
                return;
            }

            const now = new Date();
            const activeList = devices.filter(d => d.is_current && (Math.floor((now - new Date(d.last_seen)) / 3600000) < 24));
            const staleList = devices.filter(d => !activeList.includes(d));

            activeList.sort((a,b) => b.risk_score - a.risk_score);
            staleList.sort((a,b) => b.risk_score - a.risk_score);

            let html = "";
            if (activeList.length > 0) {
                html += `<div class="device-section-block"><div class="section-header-wrap"><div class="section-header"><div class="pulse-dot-green"></div> Active Devices</div><div class="section-subtext">${activeList.length} live</div></div><div class="device-grid">`;
                activeList.forEach((d, idx) => { html += renderDeviceCard(d, true, animate ? idx : -1); });
                html += `</div></div>`;
            }
            if (staleList.length > 0) {
                if (activeList.length > 0) html += `<div class="section-divider">— previously connected —</div>`;
                html += `<div class="device-section-block"><div class="section-header-wrap"><div class="section-header" style="color:var(--text-dim);"><div class="hollow-dot"></div> Stale Devices</div><div class="section-subtext">${staleList.length} devices</div></div><div class="device-grid">`;
                staleList.forEach((d, idx) => { html += renderDeviceCard(d, false, animate ? (activeList.length + idx) : -1); });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function renderDeviceCard(d, isActive, aniIndex = -1) {
            const emoji = getDeviceEmoji(d.device_type);
            const colorMap = { 'A': 'var(--grade-a)', 'B': 'var(--grade-b)', 'C': 'var(--grade-c)', 'D': 'var(--grade-d)', 'F': 'var(--grade-f)' };
            const gradeColor = colorMap[d.grade];
            const portHtml = (d.open_ports || []).map(p => {
                let cls = "";
                if ([21, 23, 445].includes(p)) cls = "danger";
                else if ([80, 554, 1883, 1900, 3389].includes(p)) cls = "warn";
                else if ([22, 443, 5353, 8008].includes(p)) cls = "safe";
                return `<div class="port-pill ${cls}">${p}</div>`;
            }).join('');

            const aniStyle = aniIndex >= 0 ? `style="opacity: 0; transform: translateY(40px); transition: all 400ms ease-out ${aniIndex * 100}ms;"` : '';

            return `
                <div class="device-card ${isActive ? 'active-card' : 'stale-card'} card-item-ani" 
                     ${aniStyle}
                     style="--grade-color: ${gradeColor}; border-left-color: ${gradeColor};"
                     onclick="investigateDevice('${d.ip_address}')">
                    <div class="card-header">
                        <div class="card-type-wrap"><div class="card-type-label"><span>${emoji}</span> ${d.device_type}</div><div class="card-manufacturer">${d.manufacturer}</div></div>
                        <div class="grade-badge" style="background: ${gradeColor}">${d.grade}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-ip">${d.ip_address}</div>
                        <div class="status-tag ${isActive ? 'active' : 'stale'}">${isActive ? '● ACTIVE' : '○ STALE'}</div>
                        <div class="risk-bar-wrap"><div class="risk-bar-label"><span>Risk Score</span><span>${d.risk_score}</span></div><div class="risk-bar-bg"><div class="risk-bar-fill" style="width: ${d.risk_score}%; background: ${gradeColor};"></div></div></div>
                        <div class="port-pills">${portHtml}</div>
                        <button class="view-btn">View Details →</button>
                    </div>
                </div>
            `;
        }

        /**
         * PHASE 4: EXIT ANIMATION
         */
        function exitRadarAnimation() {
            const radarSection = document.getElementById('radarSection');
            const radarContainer = document.getElementById('radarContainer');
            const scanBtn = document.getElementById('scanBtn');

            // 1. Get positions
            const radarRect = radarContainer.getBoundingClientRect();
            const btnRect = scanBtn.getBoundingClientRect();

            // 2. Set to fixed
            radarContainer.style.position = 'fixed';
            radarContainer.style.top = radarRect.top + 'px';
            radarContainer.style.left = radarRect.left + 'px';
            radarContainer.style.width = radarRect.width + 'px';
            radarContainer.style.height = radarRect.height + 'px';
            radarContainer.style.margin = '0';
            radarContainer.style.zIndex = '1000';

            // 3. Trigger transition
            requestAnimationFrame(() => {
                radarContainer.style.transition = 'all 1200ms cubic-bezier(0.4, 0, 0.2, 1)';
                radarContainer.style.transform = 'scale(0.08)';
                radarContainer.style.top = (btnRect.top + btnRect.height/2 - radarRect.height/2) + 'px';
                radarContainer.style.left = (btnRect.left + btnRect.width/2 - radarRect.width/2) + 'px';
                
                setTimeout(() => {
                    radarContainer.style.opacity = '0';
                }, 800);
            });

            // 4. End Phase
            setTimeout(() => {
                radarSection.style.display = 'none';
                radarContainer.style.transition = '';
                radarContainer.style.transform = '';
                radarContainer.style.opacity = '1';
                radarContainer.style.position = 'relative';
                radarContainer.style.top = '';
                radarContainer.style.left = '';
                
                finishScanSequence();
            }, 1200);
        }

        function finishScanSequence() {
            // PHASE 5
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.classList.add('glow-animation');
            setTimeout(() => scanBtn.classList.remove('glow-animation'), 800);

            const wrapper = document.getElementById('devicesContainerWrapper');
            wrapper.classList.remove('hidden');
            
            renderDeviceGrid(true); // Render with staggered delay
            
            // Trigger animation for each card
            setTimeout(() => {
                document.querySelectorAll('.card-item-ani').forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                });
            }, 50);
        }

        async function triggerScan() {
            const btn = document.getElementById('scanBtn');
            btn.disabled = true;
            
            // PHASE 1
            const wrapper = document.getElementById('devicesContainerWrapper');
            wrapper.classList.add('hidden');
            
            const radarSection = document.getElementById('radarSection');
            const radarContainer = document.getElementById('radarContainer');
            const dotsOverlay = document.getElementById('radarDots');
            
            dotsOverlay.innerHTML = "";
            foundIps.clear();

            // REALISM: Pre-fill radar with known devices as "Ghost Signals"
            devices.forEach(d => addRadarDot(d, true));
            
            radarSection.style.display = 'flex';
            radarSection.style.opacity = '0';
            radarContainer.style.transform = 'scale(0.3)';
            
            requestAnimationFrame(() => {
                radarSection.style.transition = 'opacity 600ms ease';
                radarSection.style.opacity = '1';
                radarContainer.style.transform = 'scale(1)';
            });

            scanActive = true;
            try { 
                await fetch('/api/scan', { method: 'POST' }); 
                pollStatus(); 
            } catch (err) { 
                console.error("Scan init failed:", err); 
                resetScanUI(); 
            }
        }

        function pollStatus() {
            const timer = setInterval(async () => {
                const res = await fetch('/api/scan/status'); 
                const state = await res.json();
                
                document.getElementById('progressFill').style.width = state.progress + "%";
                document.getElementById('progressText').innerText = state.stage.toUpperCase();

                // PHASE 2: Live dots on radar
                if (state.active) {
                    await loadData(true); // silent load to get devices list
                    devices.forEach(d => {
                        if (d.is_current) addRadarDot(d);
                    });
                }

                if (!state.active) {
                    clearInterval(timer);
                    scanActive = false;
                    
                    // PHASE 3: Complete
                    setTimeout(() => {
                        exitRadarAnimation(); // Beings PHASE 4
                        resetScanUI();
                        loadData(); 
                    }, 1500);
                }
            }, 1000);
        }

        function resetScanUI() { 
            const btn = document.getElementById('scanBtn'); 
            btn.disabled = false; 
            document.getElementById('statusDot').className = "status-dot"; 
            document.getElementById('progressSection').classList.remove('active'); 
        }

        function getDeviceEmoji(type) {
            const lib = { 'Camera': '📹', 'Printer': '🖨️', 'Router': '📡', 'Linux': '🐧', 'iPhone': '📱', 'Android': '📱', 'TV': '📺', 'Speaker': '🔊', 'PC': '🖥️', 'Windows': '🖥️', 'Apple': '💻' };
            for(let k in lib) if(type.includes(k)) return lib[k];
            return '🔌';
        }

        function investigateDevice(ip) {
            const device = devices.find(d => d.ip_address === ip);
            if (!device) return;
            const panel = document.getElementById('investigatePanel');
            const overlay = document.getElementById('investigateOverlay');
            const header = document.getElementById('panelHeader');
            const content = document.getElementById('panelContent');
            const colorMap = { 'A': 'var(--grade-a)', 'B': 'var(--grade-b)', 'C': 'var(--grade-c)', 'D': 'var(--grade-d)', 'F': 'var(--grade-f)' };
            panel.style.borderLeftColor = colorMap[device.grade];
            const emoji = getDeviceEmoji(device.device_type);
            header.innerHTML = `<button class="panel-close" onclick="closeInvestigation()">✕</button><div style="display:flex; align-items:center; gap:12px; margin-top:20px;"><span style="font-size:32px;">${emoji}</span><div><div style="font-family:'IBM Plex Mono'; font-size:18px; color:var(--primary);">${device.ip_address}</div><div style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">${device.device_type} • ${device.manufacturer}</div></div></div>`;
            content.innerHTML = `<div style="background:#161B22; padding:15px; border-radius:8px; margin-bottom:20px;"><div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px;"><span>Risk Exposure</span><strong>${device.risk_score}/100</strong></div><div style="height:10px; background:var(--border); border-radius:5px; overflow:hidden;"><div style="height:100%; width:${device.risk_score}%; background:${colorMap[device.grade]};"></div></div></div><div style="font-size:11px; text-transform:uppercase; color:var(--text-dim); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:5px;">Open Ports</div><div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;">${(device.open_ports || []).map(p => `<div class="port-pill">${p}</div>`).join('')}</div><div style="font-size:11px; text-transform:uppercase; color:var(--text-dim); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:5px;">Remediation</div><ul style="font-size:13px; padding-left:15px; margin-bottom:20px;">${(device.remediation || []).slice(0,3).map(r => `<li style="margin-bottom:8px;">${r}</li>`).join('')}</ul>`;
            overlay.classList.add('active'); panel.classList.add('active');
        }

        function closeInvestigation() { document.getElementById('investigatePanel').classList.remove('active'); document.getElementById('investigateOverlay').classList.remove('active'); }
        function switchTab(name, e) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active')); document.getElementById(name+'Tab').classList.add('active'); e.target.classList.add('active'); }

        document.addEventListener('DOMContentLoaded', () => { 
            animateRadar(); 
            loadData(); 
        });

        function renderReport() {
            const container = document.getElementById('reportContainer'); const total = devices.length; if (total === 0) return;
            const grades = { A: 0, B: 0, C: 0, D: 0, F: 0 }; devices.forEach(d => grades[d.grade]++);
            let gradeBars = ""; ['A','B','C','D','F'].forEach(g => { const pct = (grades[g] / total) * 100; gradeBars += `<div style="margin-bottom:15px;"><div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px;"><span>Grade ${g}</span><span>${Math.round(pct)}%</span></div><div style="height:8px; background:var(--border); border-radius:4px; overflow:hidden;"><div style="height:100%; width:${pct}%; background:var(--grade-${g.toLowerCase()});"></div></div></div>`; });
            container.innerHTML = `<div style="display:grid; grid-template-columns: 1fr 2fr; gap:40px;"><div><div style="font-size:11px; text-transform:uppercase; color:var(--text-dim); margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:5px;">Grade Distribution</div>${gradeBars}</div><div><div style="font-size:11px; text-transform:uppercase; color:var(--text-dim); margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:5px;">Critical Asset Threats</div>${devices.filter(d => d.grade === 'F').slice(0, 5).map(d => `<div style="background:rgba(239, 68, 68, 0.05); border:1px solid var(--grade-f); border-radius:8px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;"><div><div style="font-family:'IBM Plex Mono'; font-weight:700; color:var(--grade-f);">${d.ip_address}</div><div style="font-size:11px; color:var(--text-dim);">${d.device_type}</div></div><div style="font-size:20px;">🚨</div></div>`).join('') || "No critical threats detected."}</div></div>`;
        }
    </script>
</body>
</html>

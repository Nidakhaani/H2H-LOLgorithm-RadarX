services:
  - type: web
    name: radarx-iot-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: NETWORK_RANGE
        value: "192.168.1.0/24"
